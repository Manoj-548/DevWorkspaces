version: "3.9"

services:
  django_api:
    build: ./django_api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./logs:/logs

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    env_file: .env

  ml:
    build: ./ml
    ports:
      - "8002:8000"
    env_file: .env

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    env_file: .env
