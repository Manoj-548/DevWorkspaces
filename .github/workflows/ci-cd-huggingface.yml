name: CI/CD + Hugging Face Sync

on:
  push:
    branches: [main, master]
    paths:
      - '**.py'
      - 'requirements.txt'
      - 'docker-compose.yml'
      - '**.yaml'
      - '**.yml'
  pull_request:
    branches: [main, master]

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  # ============================================
  # CI: Lint and Test
  # ============================================
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 black mypy
      
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Check Python formatting with black
        run: |
          black --check . --exclude '\.git|venv|.github'
      
      - name: Type checking with mypy
        run: |
          mypy . --ignore-missing-imports || true

  # ============================================
  # CI: Test All Projects
  # ============================================
  test-projects:
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      matrix:
        project:
          - yolov8-poc
          - python-dashboard
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install ${{ matrix.project }} dependencies
        working-directory: ./projects/${{ matrix.project }}
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: Validate ${{ matrix.project }}
        working-directory: ./projects/${{ matrix.project }}
        run: |
          echo "✅ ${{ matrix.project }} dependencies installed successfully"

  # ============================================
  # CD: Build Docker Images
  # ============================================
  docker:
    runs-on: ubuntu-latest
    needs: test-projects
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build with Docker Compose
        run: |
          docker compose build

  # ============================================
  # CD: Sync to Hugging Face (Auto on Push)
  # ============================================
  sync-huggingface:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && env.HF_TOKEN != ''
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install Hugging Face Hub
        run: pip install huggingface_hub
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Login to Hugging Face
        run: |
          echo "$HF_TOKEN" | huggingface-cli login --token $HF_TOKEN
      
      - name: Sync Datasets to HF
        run: |
          python3 << 'EOF'
          from huggingface_hub import HfApi
          api = HfApi()
          
          # Sync datasets directory
          try:
              api.upload_folder(
                  folder_path="projects/yolov8-poc",
                  repo_id="Manoj548/datasets",
                  repo_type="dataset",
                  commit_message=f"GitHub Actions: Auto-sync on push {os.environ['GITHUB_SHA'][:8]}"
              )
              print("✅ Synced datasets to Hugging Face")
          except Exception as e:
              print(f"⚠️  Datasets sync: {e}")
          
          # Sync configs
          try:
              api.upload_folder(
                  folder_path="infra",
                  repo_id="Manoj548/configs",
                  repo_type="dataset",
                  commit_message=f"GitHub Actions: Auto-sync on push {os.environ['GITHUB_SHA'][:8]}"
              )
              print("✅ Synced configs to Hugging Face")
          except Exception as e:
              print(f"⚠️  Configs sync: {e}")
          EOF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

  # ============================================
  # Notifications
  # ============================================
  notify:
    runs-on: ubuntu-latest
    needs: [docker, sync-huggingface]
    if: always()
    steps:
      - name: Print CI/CD Summary
        run: |
          echo ""
          echo "========================================"
          echo "✅ CI/CD Pipeline Complete!"
          echo "========================================"
          echo "📊 Run: ${{ github.run_id }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "🔗 https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""

