version: "3.9"

services:
  # Redis for caching and pub/sub (required for real-time features)
  redis:
    image: redis:7-alpine
    container_name: dev_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Real-Time API Server with WebSocket support
  realtime-api:
    build:
      context: ./services/realtime_api
      dockerfile: Dockerfile
    container_name: dev_realtime_api
    ports:
      - "8765:8765"
    volumes:
      # Mount project files for imports
      - .:/home/manoj/DevWorkspaces:ro
      # Mount SSD directories
      - /data:/data
      - /backups:/backups
      # Mount Windows drives
      - /mnt/c:/mnt/c:ro
      - /mnt/d:/mnt/d
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Web Dashboard with Streamlit
  web:
    build:
      context: ./projects/comprehensive-dashboard
      dockerfile: Dockerfile
    container_name: dev_web
    working_dir: /app
    ports:
      - "8501:8501"
    volumes:
      # Mount project files
      - ./projects/comprehensive-dashboard:/app
      # Mount SSD directories
      - /backups:/backups
      # Mount Windows drives
      - /mnt/c:/mnt/c:ro
      - /mnt/d:/mnt/d
    environment:
      - WEBSOCKET_URL=ws://realtime-api:8765/ws
      - API_BASE_URL=http://realtime-api:8765
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - realtime-api
      - redis
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: dev_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    volumes:
      # Use SSD for database storage
      - /data/postgres:/var/lib/postgresql/data
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8
    container_name: dev_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: devdb
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpass
    volumes:
      # Use SSD for database storage
      - /data/mysql:/var/lib/mysql
    restart: unless-stopped

  # MongoDB
  mongodb:
    image: mongo:6
    container_name: dev_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongouser
      MONGO_INITDB_ROOT_PASSWORD: mongopass
    volumes:
      # Use SSD for database storage
      - /data/mongodb:/data/db
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
  mysql_data:
  mongo_data:

networks:
  default:
    name: devworkspaces_network
